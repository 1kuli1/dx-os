<!DOCTYPE html>
<html lang="sv">

<head>

<!-- ===== TECKENUPPSÄTTNING ===== -->
<meta charset="UTF-8">

<!-- ===== MOBIL ===== -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ===== TITEL ===== -->
<title>DX-OS World Map</title>

<!-- ===== LEAFLET CSS ===== -->
<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

/* ===== GRUND ===== */
*{
    box-sizing:border-box;
}

/* ===== BODY ===== */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#05070b;
    color:#ffffff;
}

/* ===== HEADER ===== */
header{
    background:#0b1220;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #1f2937;
}

/* ===== RUBRIK ===== */
header h1{
    margin:0;
    color:#eab308;
    font-size:32px;
}

/* ===== TEXT ===== */
header p{
    margin-top:10px;
    color:#cbd5e1;
}

/* ===== KARTWRAPPER ===== */
.map-wrapper{
    width:100%;
    height:70vh;
    position:relative;
}

/* ===== MAP ===== */
#map{
    width:100%;
    height:100%;
}

/* ===== KONTROLLPANEL ===== */
.control-panel{
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:15px;
    padding:15px;
    width:220px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* ===== RUBRIK ===== */
.control-panel h2{
    margin-top:0;
    color:#eab308;
    font-size:18px;
}

/* ===== LABEL ===== */
.control-panel label{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
    color:#cbd5e1;
}

/* ===== PANELTEXT ===== */
.panel-text{
    margin-top:15px;
    font-size:13px;
    color:#94a3b8;
}

/* ===== PANEL ===== */
.panel{
    background:#0b1220;
    border-top:2px solid #1f2937;
    padding:20px;
}

/* ===== FORM ===== */
.form-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    max-width:550px;
    margin:auto;
}

/* ===== INPUT ===== */
input,
select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:#ffffff;
    font-size:16px;
}

/* ===== BUTTON ===== */
button{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#eab308;
    color:#000000;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

/* ===== HOVER ===== */
button:hover{
    opacity:0.9;
}

/* ===== INFO ===== */
.info{
    text-align:center;
    color:#94a3b8;
    margin-top:15px;
    font-size:14px;
}

</style>

</head>

<body>

<!-- ===== HEADER ===== -->
<header>

<h1>DX-OS World Map</h1>

<p>

DX-karta med mottagare, stationer och DX-paths.

</p>

</header>

<!-- ===== KARTWRAPPER ===== -->
<div class="map-wrapper">

<!-- ===== KONTROLLPANEL ===== -->
<div class="control-panel">

<h2>

Kartlager

</h2>

<label>

<input
type="checkbox"
id="toggleReceivers"
checked
onchange="toggleReceivers()">

Visa mottagare

</label>

<label>

<input
type="checkbox"
id="toggleStations"
checked
onchange="toggleStations()">

Visa stationer

</label>

<label>

<input
type="checkbox"
id="toggleLines"
checked
onchange="toggleLines()">

Visa DX-linjer

</label>

<div class="panel-text">

Du kan slå av och på olika kartlager.

</div>

</div>

<!-- ===== KARTA ===== -->
<div id="map"></div>

</div>

<!-- ===== PANEL ===== -->
<div class="panel">

<div class="form-grid">

<!-- ===== STATION ===== -->
<input
type="text"
id="station"
placeholder="Stationsnamn"
oninput="autoFillStation()">

<!-- ===== FREKVENS ===== -->
<input
type="text"
id="frequency"
placeholder="Frekvens">

<!-- ===== LAND ===== -->
<input
type="text"
id="country"
placeholder="Land">

<!-- ===== RX ===== -->
<select id="receiverSelect">

<option value="">
Välj mottagare
</option>

</select>

<!-- ===== LAT ===== -->
<input
type="number"
id="lat"
placeholder="Latitud">

<!-- ===== LNG ===== -->
<input
type="number"
id="lng"
placeholder="Longitud">

<!-- ===== KNAPP ===== -->
<button onclick="addStation()">

Lägg till station

</button>

</div>

<div class="info">

Stationer kan autofyllas från stationsdatabasen.

</div>

</div>

<!-- ===== LEAFLET ===== -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ===== STATIONSDATABAS ===== */
const stationDatabase = [

{
    name:"Radio Romania",
    country:"Rumänien",
    lat:44.43,
    lng:26.10
},

{
    name:"Radio Caroline",
    country:"England",
    lat:51.50,
    lng:0.12
},

{
    name:"SER",
    country:"Spanien",
    lat:40.41,
    lng:-3.70
},

{
    name:"BBC",
    country:"England",
    lat:51.50,
    lng:-0.12
},

{
    name:"RNE",
    country:"Spanien",
    lat:40.41,
    lng:-3.70
}

];

/* ===== KARTA ===== */
const map =
L.map('map').setView([20,0],2);

/* ===== KARTLAGER ===== */
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}).addTo(map);

/* ===== ARRAYER ===== */
let stations = [];

let receiverMarkers = [];

let stationMarkers = [];

let dxLines = [];

/* ===== LADDA ===== */
loadReceivers();

loadStations();

/* ===== LADDA RX ===== */
function loadReceivers(){

    const saved =
    localStorage.getItem("dxReceivers");

    if(!saved){
        return;
    }

    const receivers =
    JSON.parse(saved);

    const select =
    document.getElementById("receiverSelect");

    receivers.forEach(receiver => {

        const option =
        document.createElement("option");

        option.value =
        receiver.id;

        option.textContent =
        receiver.name;

        select.appendChild(option);

    });

}

/* ===== AUTOFYLL ===== */
function autoFillStation(){

    /* ===== HÄMTA ===== */
    const input =
    document.getElementById("station")
    .value
    .toLowerCase();

    /* ===== LOOP ===== */
    stationDatabase.forEach(station => {

        /* ===== MATCH ===== */
        if(
            station.name
            .toLowerCase()
            .includes(input)
            &&
            input.length > 2
        ){

            /* ===== FYLL ===== */
            document.getElementById("country").value =
            station.country;

            document.getElementById("lat").value =
            station.lat;

            document.getElementById("lng").value =
            station.lng;

        }

    });

}

/* ===== LÄGG TILL ===== */
function addStation(){

    const station =
    document.getElementById("station").value;

    const frequency =
    document.getElementById("frequency").value;

    const country =
    document.getElementById("country").value;

    const receiverId =
    document.getElementById("receiverSelect").value;

    const lat =
    parseFloat(
        document.getElementById("lat").value
    );

    const lng =
    parseFloat(
        document.getElementById("lng").value
    );

    if(
        !station ||
        !frequency ||
        !country ||
        !receiverId ||
        isNaN(lat) ||
        isNaN(lng)
    ){
        alert("Fyll i alla fält.");
        return;
    }

    const saved =
    localStorage.getItem("dxReceivers");

    const receivers =
    JSON.parse(saved);

    const receiver =
    receivers.find(
        r => r.id == receiverId
    );

    /* ===== MARKÖR ===== */
    const marker =
    L.marker([lat,lng]).addTo(map);

    marker.bindPopup(
        `
        <b>${station}</b><br>
        ${frequency}<br>
        ${country}<br>
        RX: ${receiver.name}
        `
    );

    stationMarkers.push(marker);

    /* ===== LINJE ===== */
    const line =
    L.polyline(
    [
        [receiver.lat, receiver.lng],
        [lat, lng]
    ],
    {
        color:receiver.color,
        weight:2
    }).addTo(map);

    dxLines.push(line);

    /* ===== DATA ===== */
    const stationData = {

        station:station,

        frequency:frequency,

        country:country,

        lat:lat,

        lng:lng,

        receiverId:receiver.id,

        receiverName:receiver.name,

        receiverColor:receiver.color

    };

    stations.push(stationData);

    localStorage.setItem(
        "dxStations",
        JSON.stringify(stations)
    );

    clearForm();

}

/* ===== LADDA STATIONER ===== */
function loadStations(){

    const saved =
    localStorage.getItem("dxStations");

    const rxSaved =
    localStorage.getItem("dxReceivers");

    if(!rxSaved){
        return;
    }

    const receivers =
    JSON.parse(rxSaved);

    /* ===== RX ===== */
    receivers.forEach(receiver => {

        const rxMarker =
        L.circleMarker(
        [
            receiver.lat,
            receiver.lng
        ],
        {
            radius:8,
            color:receiver.color,
            fillColor:receiver.color,
            fillOpacity:1,
            weight:2
        })
        .addTo(map)

        .bindPopup(
            `
            <b>${receiver.name}</b><br>
            ${receiver.type}<br>
            ${receiver.country}
            `
        );

        receiverMarkers.push(rxMarker);

    });

    /* ===== STATIONER ===== */
    if(saved){

        stations =
        JSON.parse(saved);

        stations.forEach(station => {

            const marker =
            L.marker([
                station.lat,
                station.lng
            ]).addTo(map);

            marker.bindPopup(
                `
                <b>${station.station}</b><br>
                ${station.frequency}<br>
                ${station.country}<br>
                RX: ${station.receiverName}
                `
            );

            stationMarkers.push(marker);

            const receiver =
            receivers.find(
                r => r.id == station.receiverId
            );

            if(receiver){

                const line =
                L.polyline(
                [
                    [receiver.lat, receiver.lng],
                    [station.lat, station.lng]
                ],
                {
                    color:receiver.color,
                    weight:2
                }).addTo(map);

                dxLines.push(line);

            }

        });

    }

}

/* ===== TOGGLE RX ===== */
function toggleReceivers(){

    const visible =
    document.getElementById(
        "toggleReceivers"
    ).checked;

    receiverMarkers.forEach(marker => {

        if(visible){
            map.addLayer(marker);
        }
        else{
            map.removeLayer(marker);
        }

    });

}

/* ===== TOGGLE STATIONER ===== */
function toggleStations(){

    const visible =
    document.getElementById(
        "toggleStations"
    ).checked;

    stationMarkers.forEach(marker => {

        if(visible){
            map.addLayer(marker);
        }
        else{
            map.removeLayer(marker);
        }

    });

}

/* ===== TOGGLE LINJER ===== */
function toggleLines(){

    const visible =
    document.getElementById(
        "toggleLines"
    ).checked;

    dxLines.forEach(line => {

        if(visible){
            map.addLayer(line);
        }
        else{
            map.removeLayer(line);
        }

    });

}

/* ===== TÖM ===== */
function clearForm(){

    document.getElementById("station").value = "";

    document.getElementById("frequency").value = "";

    document.getElementById("country").value = "";

    document.getElementById("receiverSelect").value = "";

    document.getElementById("lat").value = "";

    document.getElementById("lng").value = "";

}

</script>

</body>
</html>
