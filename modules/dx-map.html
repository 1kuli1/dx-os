<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX-OS World Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#05070b;
    color:#ffffff;
}

header{
    background:#0b1220;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #1f2937;
}

header h1{
    margin:0;
    color:#eab308;
    font-size:32px;
}

header p{
    margin-top:10px;
    color:#cbd5e1;
}

.map-wrapper{
    width:100%;
    height:70vh;
    position:relative;
}

#map{
    width:100%;
    height:100%;
}

.control-panel{
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
    width:250px;
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    max-height:90%;
    overflow:auto;
}

.control-panel h2{
    margin-top:0;
    color:#eab308;
    font-size:18px;
}

.control-panel label{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
    color:#cbd5e1;
    cursor:pointer;
    font-size:14px;
}

.panel{
    background:#0b1220;
    border-top:2px solid #1f2937;
    padding:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    max-width:550px;
    margin:auto;
}

input,
select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:#ffffff;
    font-size:16px;
}

button{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#eab308;
    color:#000000;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.info{
    text-align:center;
    color:#94a3b8;
    margin-top:15px;
    font-size:14px;
}

hr{
    border:none;
    border-top:1px solid #1f2937;
    margin:15px 0;
}

#statsPanel p{
    margin:8px 0;
    color:#cbd5e1;
    font-size:14px;
}

#frequencySuggestions{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:10px;
    padding:12px;
    color:#cbd5e1;
    display:none;
}

.suggestion-item{
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    background:#0b1220;
    cursor:pointer;
}

.suggestion-item:hover{
    background:#1f2937;
}
</style>
</head>

<body>

<header>
<h1>DX-OS World Map</h1>
<p>DX-karta med mottagare, stationer, statistik och frekvensförslag.</p>
</header>

<div class="map-wrapper">

<div class="control-panel">

<h2>Kartlager</h2>

<label>
<input type="checkbox" id="toggleReceivers" checked onchange="redrawMap()">
Visa mottagare
</label>

<label>
<input type="checkbox" id="toggleStations" checked onchange="redrawMap()">
Visa stationer
</label>

<label>
<input type="checkbox" id="toggleLines" checked onchange="redrawMap()">
Visa DX-linjer
</label>

<hr>

<h2>Mottagare</h2>
<div id="receiverFilters"></div>

<hr>

<h2>Statistik</h2>
<div id="statsPanel">
<p>Stationer: 0</p>
<p>Länder: 0</p>
<p>Mottagare: 0</p>
<p>Senaste station: Ingen</p>
</div>

</div>

<div id="map"></div>

</div>

<div class="panel">

<div class="form-grid">

<input type="text" id="station" placeholder="Stationsnamn" oninput="autoFillStation()">

<input type="text" id="frequency" placeholder="Frekvens, t.ex. 675" oninput="showFrequencySuggestions()">

<div id="frequencySuggestions"></div>

<input type="text" id="country" placeholder="Land">

<select id="receiverSelect">
<option value="">Välj mottagare</option>
</select>

<input type="number" id="lat" placeholder="Latitud">

<input type="number" id="lng" placeholder="Longitud">

<button onclick="addStation()">Lägg till station</button>

</div>

<div class="info">
Skriv en frekvens så visas möjliga stationer automatiskt.
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const stationDatabase = [
    {name:"Radio Romania", country:"Rumänien", lat:44.43, lng:26.10},
    {name:"Radio Caroline", country:"England", lat:51.50, lng:0.12},
    {name:"SER", country:"Spanien", lat:40.41, lng:-3.70},
    {name:"BBC", country:"England", lat:51.50, lng:-0.12},
    {name:"RNE", country:"Spanien", lat:40.41, lng:-3.70},
    {name:"Radio Maria", country:"Italien", lat:45.46, lng:9.19}
];

const frequencyDatabase = [
    {
        frequency:"675",
        stations:["Radio Maria"]
    },
    {
        frequency:"747",
        stations:["Radio 5", "Mogelijke MW-stationer"]
    },
    {
        frequency:"999",
        stations:["SER", "RNE"]
    },
    {
        frequency:"648",
        stations:["Radio Caroline"]
    },
    {
        frequency:"6030",
        stations:["Radio Romania"]
    }
];

const map = L.map("map").setView([20,0],2);

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {attribution:"© OpenStreetMap"}
).addTo(map);

let stations = [];
let receivers = [];
let receiverMarkers = [];
let stationMarkers = [];
let dxLines = [];
let receiverVisibility = {};

loadReceivers();
createReceiverFilters();
loadStations();

function loadReceivers(){

    const saved = localStorage.getItem("dxReceivers");

    if(!saved){
        return;
    }

    receivers = JSON.parse(saved);

    const select = document.getElementById("receiverSelect");

    receivers.forEach(receiver => {

        receiverVisibility[receiver.id] = true;

        const option = document.createElement("option");

        option.value = receiver.id;

        option.textContent = receiver.name;

        select.appendChild(option);

    });

}

function createReceiverFilters(){

    const container = document.getElementById("receiverFilters");

    container.innerHTML = "";

    receivers.forEach(receiver => {

        const label = document.createElement("label");

        label.innerHTML = `
        <input type="checkbox" checked onchange="toggleReceiver('${receiver.id}')">
        <span style="color:${receiver.color};font-weight:bold;">${receiver.name}</span>
        `;

        container.appendChild(label);

    });

}

function toggleReceiver(receiverId){

    receiverVisibility[receiverId] = !receiverVisibility[receiverId];

    redrawMap();

}

function autoFillStation(){

    const input = document.getElementById("station").value.toLowerCase();

    stationDatabase.forEach(station => {

        if(station.name.toLowerCase().includes(input) && input.length > 2){

            document.getElementById("country").value = station.country;

            document.getElementById("lat").value = station.lat;

            document.getElementById("lng").value = station.lng;

        }

    });

}

function showFrequencySuggestions(){

    const input = document.getElementById("frequency").value.replace("kHz","").trim();

    const box = document.getElementById("frequencySuggestions");

    box.innerHTML = "";

    if(input.length < 2){

        box.style.display = "none";

        return;

    }

    const match = frequencyDatabase.find(item => item.frequency === input);

    if(!match){

        box.style.display = "none";

        return;

    }

    box.style.display = "block";

    box.innerHTML = "<strong>Möjliga stationer:</strong>";

    match.stations.forEach(name => {

        const div = document.createElement("div");

        div.className = "suggestion-item";

        div.textContent = name;

        div.onclick = function(){

            document.getElementById("station").value = name;

            autoFillStation();

            box.style.display = "none";

        };

        box.appendChild(div);

    });

}

function addStation(){

    const station = document.getElementById("station").value;

    const frequency = document.getElementById("frequency").value;

    const country = document.getElementById("country").value;

    const receiverId = document.getElementById("receiverSelect").value;

    const lat = parseFloat(document.getElementById("lat").value);

    const lng = parseFloat(document.getElementById("lng").value);

    if(!station || !frequency || !country || !receiverId || isNaN(lat) || isNaN(lng)){

        alert("Fyll i alla fält.");

        return;

    }

    const receiver = receivers.find(r => r.id == receiverId);

    const stationData = {
        station:station,
        frequency:frequency,
        country:country,
        lat:lat,
        lng:lng,
        receiverId:receiver.id,
        receiverName:receiver.name,
        receiverColor:receiver.color
    };

    stations.push(stationData);

    localStorage.setItem("dxStations", JSON.stringify(stations));

    redrawMap();

    clearForm();

}

function loadStations(){

    const saved = localStorage.getItem("dxStations");

    if(saved){

        stations = JSON.parse(saved);

    }

    redrawMap();

}

function redrawMap(){

    receiverMarkers.forEach(marker => map.removeLayer(marker));

    stationMarkers.forEach(marker => map.removeLayer(marker));

    dxLines.forEach(line => map.removeLayer(line));

    receiverMarkers = [];

    stationMarkers = [];

    dxLines = [];

    const showReceivers = document.getElementById("toggleReceivers").checked;

    const showStations = document.getElementById("toggleStations").checked;

    const showLines = document.getElementById("toggleLines").checked;

    receivers.forEach(receiver => {

        if(receiverVisibility[receiver.id] && showReceivers){

            const rxMarker = L.circleMarker(
                [receiver.lat, receiver.lng],
                {
                    radius:8,
                    color:receiver.color,
                    fillColor:receiver.color,
                    fillOpacity:1,
                    weight:2
                }
            )
            .addTo(map)
            .bindPopup(`
                <b>${receiver.name}</b><br>
                ${receiver.type}<br>
                ${receiver.country}
            `);

            receiverMarkers.push(rxMarker);

        }

    });

    stations.forEach(station => {

        if(receiverVisibility[station.receiverId]){

            const receiver = receivers.find(r => r.id == station.receiverId);

            if(showStations){

                const marker = L.marker([station.lat, station.lng])
                .addTo(map)
                .bindPopup(`
                    <b>${station.station}</b><br>
                    ${station.frequency}<br>
                    ${station.country}<br>
                    RX: ${station.receiverName}
                `);

                stationMarkers.push(marker);

            }

            if(receiver && showLines){

                const line = L.polyline(
                    [
                        [receiver.lat, receiver.lng],
                        [station.lat, station.lng]
                    ],
                    {
                        color:receiver.color,
                        weight:2
                    }
                ).addTo(map);

                dxLines.push(line);

            }

        }

    });

    updateStats();

}

function updateStats(){

    const stationCount = stations.length;

    const countries = [...new Set(stations.map(station => station.country))];

    const countryCount = countries.length;

    const receiverCount = receivers.length;

    let latestStation = "Ingen";

    if(stations.length > 0){

        latestStation = stations[stations.length - 1].station;

    }

    document.getElementById("statsPanel").innerHTML = `
        <p>Stationer: ${stationCount}</p>
        <p>Länder: ${countryCount}</p>
        <p>Mottagare: ${receiverCount}</p>
        <p>Senaste station: ${latestStation}</p>
    `;

}

function clearForm(){

    document.getElementById("station").value = "";

    document.getElementById("frequency").value = "";

    document.getElementById("country").value = "";

    document.getElementById("receiverSelect").value = "";

    document.getElementById("lat").value = "";

    document.getElementById("lng").value = "";

    document.getElementById("frequencySuggestions").style.display = "none";

}
</script>

</body>
</html>
