<!DOCTYPE html>
<html lang="sv">

<head>

<!-- ===== TECKENUPPSÄTTNING ===== -->
<meta charset="UTF-8">

<!-- ===== MOBIL ===== -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ===== TITEL ===== -->
<title>DX-OS World Map</title>

<!-- ===== LEAFLET CSS ===== -->
<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ===== GRUND ===== */
*{
    box-sizing:border-box;
}

/* ===== BODY ===== */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#05070b;
    color:#ffffff;
}

/* ===== HEADER ===== */
header{
    background:#0b1220;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #1f2937;
}

/* ===== RUBRIK ===== */
header h1{
    margin:0;
    color:#eab308;
    font-size:32px;
}

/* ===== TEXT ===== */
header p{
    color:#cbd5e1;
    margin-top:10px;
}

/* ===== KARTA ===== */
.map-wrapper{
    width:100%;
    height:70vh;
}

/* ===== MAP ===== */
#map{
    width:100%;
    height:100%;
}

/* ===== PANEL ===== */
.panel{
    background:#0b1220;
    border-top:2px solid #1f2937;
    padding:20px;
}

/* ===== FORM ===== */
.form-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    max-width:550px;
    margin:auto;
}

/* ===== INPUT ===== */
input,
select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:#ffffff;
    font-size:16px;
}

/* ===== BUTTON ===== */
button{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#eab308;
    color:#000000;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

/* ===== HOVER ===== */
button:hover{
    opacity:0.9;
}

/* ===== INFO ===== */
.info{
    text-align:center;
    margin-top:15px;
    color:#94a3b8;
    font-size:14px;
}

</style>

</head>

<body>

<!-- ===== HEADER ===== -->
<header>

<h1>DX-OS World Map</h1>

<p>

Logga stationer och visa DX-paths från olika mottagare.

</p>

</header>

<!-- ===== KARTA ===== -->
<div class="map-wrapper">

<div id="map"></div>

</div>

<!-- ===== PANEL ===== -->
<div class="panel">

<div class="form-grid">

<!-- ===== STATION ===== -->
<input
type="text"
id="station"
placeholder="Stationsnamn">

<!-- ===== FREKVENS ===== -->
<input
type="text"
id="frequency"
placeholder="Frekvens">

<!-- ===== LAND ===== -->
<input
type="text"
id="country"
placeholder="Land">

<!-- ===== MOTTAGARE ===== -->
<select id="receiverSelect">

<option value="">
Välj mottagare
</option>

</select>

<!-- ===== LAT ===== -->
<input
type="number"
id="lat"
placeholder="Latitud">

<!-- ===== LNG ===== -->
<input
type="number"
id="lng"
placeholder="Longitud">

<!-- ===== KNAPP ===== -->
<button onclick="addStation()">

Lägg till station

</button>

</div>

<!-- ===== INFO ===== -->
<div class="info">

Mottagare hämtas automatiskt från Receiver Manager.

</div>

</div>

<!-- ===== LEAFLET ===== -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ===== SKAPA KARTA ===== */
const map =
L.map('map').setView([20,0],2);

/* ===== KARTLAGER ===== */
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}).addTo(map);

/* ===== STATIONER ===== */
let stations = [];

/* ===== LADDA ===== */
loadReceivers();

loadStations();

/* ===== LADDA MOTTAGARE ===== */
function loadReceivers(){

    /* ===== HÄMTA ===== */
    const saved =
    localStorage.getItem("dxReceivers");

    /* ===== AVBRYT ===== */
    if(!saved){
        return;
    }

    /* ===== PARSA ===== */
    const receivers =
    JSON.parse(saved);

    /* ===== SELECT ===== */
    const select =
    document.getElementById("receiverSelect");

    /* ===== LOOP ===== */
    receivers.forEach(receiver => {

        /* ===== OPTION ===== */
        const option =
        document.createElement("option");

        option.value =
        receiver.id;

        option.textContent =
        receiver.name;

        /* ===== LÄGG TILL ===== */
        select.appendChild(option);

    });

}

/* ===== LÄGG TILL STATION ===== */
function addStation(){

    /* ===== HÄMTA ===== */
    const station =
    document.getElementById("station").value;

    const frequency =
    document.getElementById("frequency").value;

    const country =
    document.getElementById("country").value;

    const receiverId =
    document.getElementById("receiverSelect").value;

    const lat =
    parseFloat(
        document.getElementById("lat").value
    );

    const lng =
    parseFloat(
        document.getElementById("lng").value
    );

    /* ===== KONTROLL ===== */
    if(
        !station ||
        !frequency ||
        !country ||
        !receiverId ||
        isNaN(lat) ||
        isNaN(lng)
    ){
        alert("Fyll i alla fält.");
        return;
    }

    /* ===== HÄMTA RX ===== */
    const saved =
    localStorage.getItem("dxReceivers");

    const receivers =
    JSON.parse(saved);

    /* ===== HITTA RX ===== */
    const receiver =
    receivers.find(
        r => r.id == receiverId
    );

    /* ===== MARKÖR ===== */
    const marker =
    L.marker([lat,lng]).addTo(map);

    /* ===== POPUP ===== */
    marker.bindPopup(
        `
        <b>${station}</b><br>
        ${frequency}<br>
        ${country}<br>
        RX: ${receiver.name}
        `
    );

    /* ===== DX-LINJE ===== */
    L.polyline(
    [
        [receiver.lat, receiver.lng],
        [lat, lng]
    ],
    {
        color:receiver.color,
        weight:2
    }).addTo(map);

    /* ===== DATA ===== */
    const stationData = {

        station:station,

        frequency:frequency,

        country:country,

        lat:lat,

        lng:lng,

        receiverId:receiver.id,

        receiverName:receiver.name,

        receiverColor:receiver.color

    };

    /* ===== SPARA ===== */
    stations.push(stationData);

    /* ===== LOCALSTORAGE ===== */
    localStorage.setItem(
        "dxStations",
        JSON.stringify(stations)
    );

    /* ===== TÖM ===== */
    clearForm();

}

/* ===== LADDA STATIONER ===== */
function loadStations(){

    /* ===== HÄMTA ===== */
    const saved =
    localStorage.getItem("dxStations");

    /* ===== FINNS ===== */
    if(saved){

        /* ===== PARSA ===== */
        stations =
        JSON.parse(saved);

        /* ===== RX ===== */
        const rxSaved =
        localStorage.getItem("dxReceivers");

        /* ===== KONTROLL ===== */
        if(!rxSaved){
            return;
        }

        /* ===== PARSA ===== */
        const receivers =
        JSON.parse(rxSaved);

        /* ===== LOOP ===== */
        stations.forEach(station => {

            /* ===== MARKÖR ===== */
            const marker =
            L.marker([
                station.lat,
                station.lng
            ]).addTo(map);

            /* ===== POPUP ===== */
            marker.bindPopup(
                `
                <b>${station.station}</b><br>
                ${station.frequency}<br>
                ${station.country}<br>
                RX: ${station.receiverName}
                `
            );

            /* ===== HITTA RX ===== */
            const receiver =
            receivers.find(
                r => r.id == station.receiverId
            );

            /* ===== KONTROLL ===== */
            if(receiver){

                /* ===== LINJE ===== */
                L.polyline(
                [
                    [receiver.lat, receiver.lng],
                    [station.lat, station.lng]
                ],
                {
                    color:receiver.color,
                    weight:2
                }).addTo(map);

            }

        });

    }

}

/* ===== TÖM ===== */
function clearForm(){

    document.getElementById("station").value = "";

    document.getElementById("frequency").value = "";

    document.getElementById("country").value = "";

    document.getElementById("receiverSelect").value = "";

    document.getElementById("lat").value = "";

    document.getElementById("lng").value = "";

}

</script>

</body>
</html>
