<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX-OS SDR Directory</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial,sans-serif;background:#05070b;color:#fff;}
header{background:#0b1220;padding:25px;text-align:center;border-bottom:2px solid #1f2937;}
header h1{margin:0;color:#eab308;font-size:34px;}
header p{color:#cbd5e1;}
.wrapper{max-width:1400px;margin:auto;padding:20px;}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:25px;}
input,select{width:100%;padding:14px;border:none;border-radius:10px;background:#111827;color:#fff;font-size:16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
.card{background:#0b1220;border:1px solid #1f2937;border-radius:15px;padding:20px;}
.card:hover{border-color:#eab308;}
.card h2{margin-top:0;color:#eab308;}
.card p{color:#cbd5e1;}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px;}
.tag{background:#111827;padding:6px 10px;border-radius:20px;font-size:13px;color:#94a3b8;}
button{margin-top:12px;width:100%;padding:14px;border:none;border-radius:10px;background:#eab308;color:#000;font-weight:bold;cursor:pointer;font-size:16px;}
.secondary{background:#1f2937;color:#fff;}
.success{background:#16a34a;color:#fff;}
</style>
</head>

<body>

<header>
<h1>DX-OS SDR Directory</h1>
<p>Hitta, öppna och importera SDR-mottagare till DX-OS.</p>
</header>

<div class="wrapper">

<div class="filters">
<input type="text" id="searchInput" placeholder="Sök mottagare..." oninput="filterSDR()">

<select id="typeFilter" onchange="filterSDR()">
<option value="all">Alla typer</option>
<option value="KiwiSDR">KiwiSDR</option>
<option value="OpenWebRX">OpenWebRX</option>
<option value="WebSDR">WebSDR</option>
</select>

<select id="bandFilter" onchange="filterSDR()">
<option value="all">Alla band</option>
<option value="HF">HF</option>
<option value="VHF">VHF</option>
<option value="UHF">UHF</option>
<option value="Airband">Airband</option>
<option value="Satellite">Satellite</option>
</select>
</div>

<div class="grid" id="sdrGrid"></div>

</div>

<script>
const sdrDatabase = [
{
    name:"University of Twente",
    type:"WebSDR",
    country:"Nederländerna",
    bands:["HF"],
    lat:52.275,
    lng:6.890,
    color:"#eab308",
    description:"Klassisk HF/WebSDR för kortvåg och DX.",
    url:"http://websdr.ewi.utwente.nl:8901/"
},
{
    name:"OpenWebRX Directory",
    type:"OpenWebRX",
    country:"Global",
    bands:["HF","VHF","UHF","Airband","Satellite"],
    lat:50.0,
    lng:10.0,
    color:"#22c55e",
    description:"Startpunkt för att hitta OpenWebRX-mottagare.",
    url:"https://rx-tx.info/map-sdr-points"
},
{
    name:"Receiverbook",
    type:"OpenWebRX",
    country:"Global",
    bands:["HF","VHF","UHF","Airband","Satellite"],
    lat:51.0,
    lng:10.0,
    color:"#38bdf8",
    description:"Bra katalog för specialmottagare, VHF/UHF och satellit.",
    url:"https://www.receiverbook.de/"
},
{
    name:"KiwiSDR Public Map",
    type:"KiwiSDR",
    country:"Global",
    bands:["HF"],
    lat:0,
    lng:0,
    color:"#f97316",
    description:"Officiell publik KiwiSDR-karta för HF/MW/SW.",
    url:"https://kiwisdr.com/public/"
},
{
    name:"QO-100 SDR Finder",
    type:"OpenWebRX",
    country:"Europa",
    bands:["Satellite","UHF"],
    lat:48.0,
    lng:11.0,
    color:"#a855f7",
    description:"Startpunkt för satellit-SDR och QO-100.",
    url:"https://rx-tx.info/map-sdr-points"
}
];

renderSDR(sdrDatabase);

function renderSDR(data){

    const grid = document.getElementById("sdrGrid");

    grid.innerHTML = "";

    data.forEach(sdr => {

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <h2>${sdr.name}</h2>
            <p>Typ: ${sdr.type}</p>
            <p>Land: ${sdr.country}</p>
            <p>${sdr.description}</p>
            <p>Lat: ${sdr.lat} | Lng: ${sdr.lng}</p>

            <div class="tags">
                ${sdr.bands.map(band => `<div class="tag">${band}</div>`).join("")}
            </div>

            <button onclick="openSDR('${sdr.url}')">Öppna SDR</button>

            <button class="success" onclick="addToDXOS('${sdr.name}')">Lägg till i DX-OS</button>
        `;

        grid.appendChild(card);

    });

}

function filterSDR(){

    const search = document.getElementById("searchInput").value.toLowerCase();

    const type = document.getElementById("typeFilter").value;

    const band = document.getElementById("bandFilter").value;

    const filtered = sdrDatabase.filter(sdr => {

        const matchesSearch =
        sdr.name.toLowerCase().includes(search) ||
        sdr.country.toLowerCase().includes(search) ||
        sdr.description.toLowerCase().includes(search);

        const matchesType =
        type === "all" || sdr.type === type;

        const matchesBand =
        band === "all" || sdr.bands.includes(band);

        return matchesSearch && matchesType && matchesBand;

    });

    renderSDR(filtered);

}

function openSDR(url){

    window.open(url,"_blank");

}

function addToDXOS(name){

    const sdr = sdrDatabase.find(item => item.name === name);

    if(!sdr){
        alert("Mottagaren hittades inte.");
        return;
    }

    const saved = localStorage.getItem("dxReceivers");

    let receivers = [];

    if(saved){
        receivers = JSON.parse(saved);
    }

    const alreadyExists = receivers.some(receiver => receiver.name === sdr.name);

    if(alreadyExists){
        alert("Den här mottagaren finns redan i DX-OS.");
        return;
    }

    const receiver = {
        id:Date.now(),
        name:sdr.name,
        type:sdr.type,
        country:sdr.country,
        lat:sdr.lat,
        lng:sdr.lng,
        color:sdr.color,
        url:sdr.url,
        bands:sdr.bands
    };

    receivers.push(receiver);

    localStorage.setItem("dxReceivers",JSON.stringify(receivers));

    alert("Mottagaren har lagts till i DX-OS.");

}
</script>

</body>
</html>
