<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DX-OS Live Radio</title>

<style>

/* ===== GRUND ===== */
*{
    box-sizing:border-box;
}

/* ===== BODY ===== */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#05070b;
    color:#ffffff;
}

/* ===== HEADER ===== */
header{
    background:#0b1220;
    padding:30px 20px;
    text-align:center;
    border-bottom:2px solid #1f2937;
}

/* ===== RUBRIK ===== */
header h1{
    margin:0;
    color:#eab308;
    font-size:36px;
}

/* ===== TEXT ===== */
header p{
    margin-top:10px;
    color:#cbd5e1;
    font-size:16px;
}

/* ===== WRAPPER ===== */
.wrapper{
    width:100%;
    max-width:1500px;
    margin:auto;
    padding:20px;
}

/* ===== SDR ===== */
.sdr-buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:25px;
}

/* ===== SDR KNAPP ===== */
.sdr-link{
    display:inline-block;
    background:#eab308;
    color:#000000;
    padding:15px 24px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    text-decoration:none;
    transition:0.2s;
}

/* ===== HOVER ===== */
.sdr-link:hover{
    transform:scale(1.05);
    opacity:0.92;
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns:1.3fr 1fr;
    gap:20px;
}

/* ===== PANEL ===== */
.panel{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:20px;
}

/* ===== PANEL RUBRIK ===== */
.panel h2{
    margin-top:0;
    color:#eab308;
}

/* ===== LOGGFÄLT ===== */
textarea{
    width:100%;
    height:500px;
    background:#020617;
    color:#ffffff;
    border:1px solid #334155;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    font-size:15px;
    line-height:1.5;
}

/* ===== INFOBOX ===== */
.info-box{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
    line-height:1.6;
    color:#cbd5e1;
}

/* ===== STATUS ===== */
.status{
    color:#22c55e;
    font-weight:bold;
}

/* ===== KNAPPGRUPPER ===== */
.log-buttons,
.band-buttons,
.favorite-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

/* ===== KNAPP ===== */
.action-btn{
    background:#eab308;
    color:#000000;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

/* ===== FAVORITKNAPP ===== */
.favorite-btn{
    width:100%;
    text-align:left;
}

/* ===== HOVER ===== */
.action-btn:hover{
    transform:scale(1.03);
    opacity:0.92;
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:25px;
    color:#64748b;
    font-size:14px;
}

/* ===== MOBIL ===== */
@media(max-width:1000px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<!-- ===== HEADER ===== -->
<header>

    <h1>DX-OS LIVE RADIO</h1>

    <p>
        SDR-kontrollcenter för DX-OS
    </p>

</header>

<!-- ===== WRAPPER ===== -->
<div class="wrapper">

    <!-- ===== SDR ===== -->
    <div class="sdr-buttons">

        <!-- ===== TWENTE ===== -->
        <a class="sdr-link"
           href="http://websdr.ewi.utwente.nl:8901/"
           target="_blank"
           rel="noopener">

            🌍 Öppna Twente WebSDR

        </a>

    </div>

    <!-- ===== GRID ===== -->
    <div class="grid">

        <!-- ===== VÄNSTER ===== -->
        <div class="panel">

            <h2>DX Logg</h2>

            <!-- ===== LOGGFÄLT ===== -->
            <textarea id="dxLog"
placeholder="Skriv din DX-logg här..."></textarea>

            <!-- ===== LOGGKNAPPAR ===== -->
            <div class="log-buttons">

                <button class="action-btn"
                        onclick="insertUTC()">

                    Lägg till UTC

                </button>

                <button class="action-btn"
                        onclick="insertTemplate()">

                    Ny loggrad

                </button>

                <button class="action-btn"
                        onclick="insertAIAnalysis()">

                    AI-analys

                </button>

                <button class="action-btn"
                        onclick="exportLog()">

                    Exportera logg

                </button>

                <button class="action-btn"
                        onclick="clearLog()">

                    Rensa logg

                </button>

            </div>

            <!-- ===== BANDKNAPPAR ===== -->
            <div class="band-buttons">

                <button class="action-btn"
                        onclick="insertBand('31m','9500-9900 kHz')">

                    31m

                </button>

                <button class="action-btn"
                        onclick="insertBand('49m','5900-6200 kHz')">

                    49m

                </button>

                <button class="action-btn"
                        onclick="insertBand('MW','530-1700 kHz')">

                    MW

                </button>

                <button class="action-btn"
                        onclick="insertBand('HAM 40m','7000-7200 kHz')">

                    HAM 40m

                </button>

            </div>

        </div>

        <!-- ===== HÖGER ===== -->
        <div class="panel">

            <h2>Favoritstationer</h2>

            <!-- ===== STATUS ===== -->
            <div class="info-box">

                <strong>Aktiv SDR</strong><br><br>

                <span class="status">

                    Twente WebSDR

                </span>

            </div>

            <!-- ===== FAVORITER ===== -->
            <div class="favorite-buttons">

                <!-- ===== BBC ===== -->
                <button class="action-btn favorite-btn"
onclick="openFavorite(
'BBC World Service',
'5975',
'Storbritannien'
)">

📻 BBC World Service — 5975 kHz

                </button>

                <!-- ===== ROMANIA ===== -->
                <button class="action-btn favorite-btn"
onclick="openFavorite(
'Radio Romania',
'9510',
'Rumänien'
)">

📻 Radio Romania — 9510 kHz

                </button>

                <!-- ===== CHINA ===== -->
                <button class="action-btn favorite-btn"
onclick="openFavorite(
'China Radio International',
'13670',
'Kina'
)">

📻 China Radio International — 13670 kHz

                </button>

                <!-- ===== TURKEY ===== -->
                <button class="action-btn favorite-btn"
onclick="openFavorite(
'Voice of Turkey',
'5960',
'Turkiet'
)">

📻 Voice of Turkey — 5960 kHz

                </button>

            </div>

            <!-- ===== INFO ===== -->
            <div class="info-box">

                <strong>AI Workflow</strong><br><br>

                1. Öppna Twente manuellt.<br>
                2. Klicka favoritstation i DX-OS.<br>
                3. Frekvens loggas automatiskt.<br>
                4. Lyssna och spela in.<br>
                5. Ladda upp till ChatGPT.<br>

            </div>

        </div>

    </div>

</div>

<!-- ===== FOOTER ===== -->
<footer>

    DX-OS © 2026

</footer>

<script>

/* ===== LOGGFÄLT ===== */
const dxLog =
document.getElementById("dxLog");

/* ===== LADDA SPARAD LOGG ===== */
window.onload = function(){

    const savedLog =
    localStorage.getItem("dxos_log");

    if(savedLog){

        dxLog.value = savedLog;

    }

}

/* ===== SPARA AUTOMATISKT ===== */
dxLog.addEventListener("input", function(){

    saveLog();

});

/* ===== SPARA ===== */
function saveLog(){

    localStorage.setItem(
        "dxos_log",
        dxLog.value
    );

}

/* ===== UTC ===== */
function insertUTC(){

    dxLog.value +=
    "\n" + getUTC() + "\n";

    saveLog();

}

/* ===== STANDARDLOGG ===== */
function insertTemplate(){

    dxLog.value +=
`\n========================
Frekvens:
Station:
Land:
SINPO:
Kommentar:
========================\n`;

    saveLog();

}

/* ===== BANDLOGG ===== */
function insertBand(band,frequency){

    dxLog.value +=
`\n========================
UTC: ${getUTC()}
Band: ${band}
Frekvens: ${frequency}
Station:
Land:
SINPO:
Kommentar:
========================\n`;

    saveLog();

}

/* ===== AI ANALYS ===== */
function insertAIAnalysis(){

    dxLog.value +=
`\n--- AI-ANALYS ----------------

Originalspråk:
Transkribering:
Svensk översättning:
Möjlig station:
Möjligt program:
Land:
Kommentar:
Osäkerhet:

--------------------------------\n`;

    saveLog();

}

/* ===== FAVORITSTATION ===== */
function openFavorite(
station,
frequency,
country
){

    dxLog.value +=
`\n========================
UTC: ${getUTC()}
Station: ${station}
Frekvens: ${frequency} kHz
Land: ${country}
SINPO:
Kommentar:
========================\n`;

    saveLog();

}

/* ===== UTC ===== */
function getUTC(){

    const now = new Date();

    return (
        now.getUTCFullYear() + "-" +
        String(now.getUTCMonth()+1).padStart(2,"0") + "-" +
        String(now.getUTCDate()).padStart(2,"0") + " " +
        String(now.getUTCHours()).padStart(2,"0") + ":" +
        String(now.getUTCMinutes()).padStart(2,"0") +
        " UTC"
    );

}

/* ===== EXPORT ===== */
function exportLog(){

    const logContent =
    dxLog.value;

    const blob =
    new Blob(
        [logContent],
        {type:"text/plain"}
    );

    const link =
    document.createElement("a");

    const now = new Date();

    const fileName =
    "dx-log-" +
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0") +
    ".txt";

    link.href =
    URL.createObjectURL(blob);

    link.download =
    fileName;

    link.click();

}

/* ===== RENSA ===== */
function clearLog(){

    const confirmClear =
    confirm("Vill du rensa loggen?");

    if(confirmClear){

        dxLog.value = "";

        localStorage.removeItem(
            "dxos_log"
        );

    }

}

</script>

</body>

</html>
