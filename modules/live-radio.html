<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DX-OS Live Radio</title>

<style>

/* ===== GRUND ===== */
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#05070b;
    color:#ffffff;
}

/* ===== HEADER ===== */
header{
    background:#0b1220;
    padding:30px 20px;
    text-align:center;
    border-bottom:2px solid #1f2937;
}

header h1{
    margin:0;
    color:#eab308;
    font-size:32px;
}

header p{
    margin-top:10px;
    color:#9ca3af;
}

/* ===== WRAPPER ===== */
.wrapper{
    max-width:1200px;
    margin:0 auto;
    padding:20px;
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* ===== PANEL ===== */
.panel{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:18px;
    padding:20px;
}

/* ===== RUBRIK ===== */
.panel h2{
    margin-top:0;
    color:#eab308;
}

/* ===== SDR ===== */
iframe{
    width:100%;
    height:500px;
    border:none;
    border-radius:12px;
    background:black;
}

/* ===== AUDIO PANEL ===== */
.audio-controls{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

    margin-top:20px;

}

.audio-controls button{

    padding:15px;

    border:none;

    border-radius:10px;

    background:#eab308;

    color:black;

    font-weight:bold;

    cursor:pointer;

    font-size:16px;

}

.audio-controls button:hover{

    transform:scale(1.02);

}

/* ===== STATUS ===== */
#statusText{

    margin-top:20px;

    text-align:center;

    color:#eab308;

    font-size:18px;

}

/* ===== LOGG ===== */
.log-box{

    background:#020617;

    border:1px solid #334155;

    border-radius:12px;

    padding:15px;

    min-height:250px;

    overflow:auto;

    font-size:15px;

    line-height:1.5;

}

/* ===== INPUT ===== */
input, textarea{

    width:100%;

    padding:12px;

    margin-top:10px;

    border-radius:10px;

    border:1px solid #334155;

    background:#020617;

    color:white;

}

/* ===== SAVE BUTTON ===== */
.save-btn{

    width:100%;

    margin-top:15px;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#22c55e;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

}

/* ===== MOBIL ===== */
@media(max-width:900px){

    .grid{

        grid-template-columns:1fr;

    }

}

</style>
</head>

<body>

<header>

<h1>📡 DX-OS Live Radio</h1>

<p>
Live radioövervakning, inspelning och DX-loggning
</p>

</header>

<div class="wrapper">

<div class="grid">

<!-- ===== SDR PANEL ===== -->

<div class="panel">

<h2>🌍 WebSDR</h2>

<iframe
src="http://websdr.ewi.utwente.nl:8901/">
</iframe>

</div>

<!-- ===== AUDIO PANEL ===== -->

<div class="panel">

<h2>🎙 Inspelning</h2>

<p>
Spela in stationer, identifieringar och DX-klipp.
</p>

<div class="audio-controls">

<button id="startRecording">
▶ Starta inspelning
</button>

<button id="stopRecording">
■ Stoppa inspelning
</button>

<button id="playRecording">
▶ Spela upp
</button>

<button id="downloadRecording">
⬇ Ladda ner
</button>

</div>

<div id="statusText">
Redo för inspelning
</div>

</div>

<!-- ===== LOGG PANEL ===== -->

<div class="panel">

<h2>📝 DX-Logg</h2>

<div class="log-box" id="logBox">

Ingen logg ännu...

</div>

</div>

<!-- ===== STATION PANEL ===== -->

<div class="panel">

<h2>📻 Station</h2>

<input
type="text"
id="stationName"
placeholder="Stationsnamn">

<input
type="text"
id="frequency"
placeholder="Frekvens">

<textarea
id="notes"
placeholder="Anteckningar">
</textarea>

<button
class="save-btn"
onclick="saveLog()">

Spara logg

</button>

</div>

</div>

</div>

<script>

/* ===== SPARA LOGG ===== */
function saveLog(){

    const station =
        document.getElementById("stationName").value;

    const frequency =
        document.getElementById("frequency").value;

    const notes =
        document.getElementById("notes").value;

    const now = new Date();

    const entry = `

${now.toUTCString()}
Station: ${station}
Frekvens: ${frequency}
Anteckningar: ${notes}

--------------------------------

`;

    const logBox =
        document.getElementById("logBox");

    logBox.innerText =
        entry + logBox.innerText;

}

</script>

<script src="js/audio-engine.js"></script>
<script src="js/live-radio.js"></script>

</body>
</html>
