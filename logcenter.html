<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">

<!-- Gör sidan mobilvänlig -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Titel i webbläsaren -->
<title>DX-OS Loggcenter</title>

<style>

/* =========================
   GRUNDINSTÄLLNINGAR
========================= */

/* Gör att padding och border räknas in i storleken */
*{
    box-sizing:border-box;
}

/* Stil för hela sidan */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#05070b;
    color:#ffffff;
}

/* =========================
   HEADER
========================= */

/* Övre rubrikområde */
header{
    background:#0b1220;
    padding:25px;
    text-align:center;
    border-bottom:2px solid #eab308;
}

/* Huvudrubrik */
header h1{
    margin:0;
    color:#eab308;
    font-size:32px;
}

/* Undertitel */
header p{
    color:#9ca3af;
    margin-top:10px;
}

/* =========================
   HUVUDLAYOUT
========================= */

/* Trekolumnslayout */
.main-layout{
    display:grid;
    grid-template-columns:320px 1fr 320px;
    gap:20px;
    padding:20px;
}

/* Mobilanpassning */
@media(max-width:1100px){

    /* Byter till en kolumn på mindre skärmar */
    .main-layout{
        grid-template-columns:1fr;
    }

}

/* =========================
   PANELER
========================= */

/* Gemensam stil för panelerna */
.panel{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:15px;
    padding:20px;
}

/* Panelrubriker */
.panel h2{
    margin-top:0;
    color:#eab308;
}

/* =========================
   FORMULÄR
========================= */

/* Textfält och dropdowns */
input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    font-size:14px;
}

/* Gör textarea större */
textarea{
    min-height:120px;
    resize:vertical;
}

/* =========================
   KNAPPAR
========================= */

/* Grundstil för knappar */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#eab308;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* Hovereffekt */
button:hover{
    opacity:0.9;
}

/* Små snabbknappar */
.quick-buttons{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:15px;
}

/* =========================
   LOGGLISTA
========================= */

/* Container för alla loggar */
#loggLista{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* Enskild logg */
.logg-kort{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:12px;
    padding:15px;
}

/* Frekvens */
.logg-kort h3{
    margin:0;
    color:#eab308;
}

/* Små texter */
.logg-kort p{
    margin:6px 0;
    color:#d1d5db;
}

/* =========================
   ANALYSPANEL
========================= */

/* Informationsrutor */
.info-box{
    background:#111827;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}

/* Rubrik i infobox */
.info-box h3{
    margin-top:0;
    color:#eab308;
}

</style>
</head>
<body>

<!-- =========================
     HEADER
========================= -->

<header>

    <!-- Sidans titel -->
    <h1>DX-OS LOGGCENTER</h1>

    <!-- Kort beskrivning -->
    <p>Logga stationer • Spara DX • Bygg din databas</p>

</header>

<!-- =========================
     HUVUDLAYOUT
========================= -->

<div class="main-layout">

    <!-- =========================
         VÄNSTER PANEL
    ========================= -->

    <div class="panel">

        <!-- Rubrik -->
        <h2>Ny logg</h2>

        <!-- UTC knapp -->
        <button onclick="hamtaUTC()">
            Hämta UTC-tid
        </button>

        <!-- Datum/tid -->
        <input type="text" id="utcTid" placeholder="UTC tid">

        <!-- Frekvens -->
        <input type="text" id="frekvens" placeholder="Frekvens">

        <!-- Snabbval band -->
        <div class="quick-buttons">

            <button onclick="sattBand('MW')">MW</button>

            <button onclick="sattBand('49m')">49m</button>

            <button onclick="sattBand('31m')">31m</button>

            <button onclick="sattBand('25m')">25m</button>

            <button onclick="sattBand('HAM')">HAM</button>

            <button onclick="sattBand('FM')">FM</button>

        </div>

        <!-- Station -->
        <input type="text" id="station" placeholder="Station">

        <!-- Land -->
        <input type="text" id="land" placeholder="Land">

        <!-- Signalstyrka -->
        <input type="text" id="signal" placeholder="Signalstyrka">

        <!-- Mode -->
        <select id="mode">

            <option>AM</option>

            <option>USB</option>

            <option>LSB</option>

            <option>CW</option>

            <option>FM</option>

        </select>

        <!-- Anteckningar -->
        <textarea id="notering" placeholder="Anteckningar"></textarea>

        <!-- Spara logg -->
        <button onclick="sparaLogg()">
            Spara logg
        </button>

    </div>

    <!-- =========================
         MITTEN PANEL
    ========================= -->

    <div class="panel">

        <!-- Rubrik -->
        <h2>Logglista</h2>

        <!-- Här visas loggar -->
        <div id="loggLista"></div>

    </div>

    <!-- =========================
         HÖGER PANEL
    ========================= -->

    <div class="panel">

        <!-- Rubrik -->
        <h2>Analys</h2>

        <!-- Info -->
        <div class="info-box">

            <h3>Systemstatus</h3>

            <p>DX-OS Loggcenter aktivt.</p>

        </div>

        <!-- Info -->
        <div class="info-box">

            <h3>Framtida funktioner</h3>

            <p>• AI-analys</p>

            <p>• Stationsdatabas</p>

            <p>• Karta</p>

            <p>• Inspelningar</p>

            <p>• Automatisk identifiering</p>

        </div>

    </div>

</div>

<script>

/* =========================
   HÄMTA UTC-TID
========================= */

/* Funktion som hämtar aktuell UTC tid */
function hamtaUTC(){

    /* Skapar nytt datumobjekt */
    const nu = new Date();

    /* Konverterar till UTC-sträng */
    const utc = nu.toISOString().replace("T"," ").substring(0,16) + " UTC";

    /* Skriver ut i fältet */
    document.getElementById("utcTid").value = utc;

}

/* =========================
   SÄTT BAND
========================= */

/* Funktion för snabbval */
function sattBand(band){

    /* Skriver band i frekvensfältet */
    document.getElementById("frekvens").value = band + " ";

}

/* =========================
   SPARA LOGG
========================= */

/* Funktion för att spara logg */
function sparaLogg(){

    /* Skapar loggobjekt */
    const logg = {

        /* Hämtar UTC tid */
        utc:document.getElementById("utcTid").value,

        /* Hämtar frekvens */
        frekvens:document.getElementById("frekvens").value,

        /* Hämtar station */
        station:document.getElementById("station").value,

        /* Hämtar land */
        land:document.getElementById("land").value,

        /* Hämtar signal */
        signal:document.getElementById("signal").value,

        /* Hämtar mode */
        mode:document.getElementById("mode").value,

        /* Hämtar notering */
        notering:document.getElementById("notering").value

    };

    /* Hämtar gamla loggar */
    let loggar = JSON.parse(localStorage.getItem("dxloggar")) || [];

    /* Lägger till ny logg */
    loggar.unshift(logg);

    /* Sparar tillbaka */
    localStorage.setItem("dxloggar",JSON.stringify(loggar));

    /* Uppdaterar logglistan */
    visaLoggar();

}

/* =========================
   VISA LOGGAR
========================= */

/* Funktion som visar loggar */
function visaLoggar(){

    /* Hämtar sparade loggar */
    let loggar = JSON.parse(localStorage.getItem("dxloggar")) || [];

    /* Hämtar loggcontainer */
    const lista = document.getElementById("loggLista");

    /* Tömmer tidigare innehåll */
    lista.innerHTML = "";

    /* Loopar igenom alla loggar */
    loggar.forEach(logg => {

        /* Skapar kort */
        const kort = document.createElement("div");

        /* Ger css-klass */
        kort.className = "logg-kort";

        /* Bygger innehåll */
        kort.innerHTML = `

            <h3>${logg.frekvens}</h3>

            <p><strong>UTC:</strong> ${logg.utc}</p>

            <p><strong>Station:</strong> ${logg.station}</p>

            <p><strong>Land:</strong> ${logg.land}</p>

            <p><strong>Signal:</strong> ${logg.signal}</p>

            <p><strong>Mode:</strong> ${logg.mode}</p>

            <p>${logg.notering}</p>

        `;

        /* Lägger till kort */
        lista.appendChild(kort);

    });

}

/* =========================
   START
========================= */

/* Visar loggar direkt vid start */
visaLoggar();

</script>

</body>
</html>
