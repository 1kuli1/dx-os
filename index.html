<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX SYSTEM</title>

<style>

/* ===== GRUND ===== */
*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0b0f14;
    color:#fff;
    margin:0;
    display:flex;
    justify-content:center;
}

/* ===== WRAPPER ===== */
.wrapper{
    width:100%;
    max-width:900px;
}

/* ===== HEADER ===== */
header{
    background:#111821;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#eab308;
    border-bottom:2px solid #1f2937;
}

/* ===== VÄLKOMST ===== */
#welcome{
    text-align:center;
    font-size:22px;
    margin-top:15px;
    color:#9ecfff;
    padding:0 15px;
}

/* ===== TIDRAD ===== */
.timebar{
    display:flex;
    justify-content:center;
    gap:40px;
    background:#16202a;
    padding:15px;
    font-size:18px;
    flex-wrap:wrap;
    border-bottom:1px solid #223040;
}

/* ===== KNAPPOMRÅDE ===== */
.container{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:60px 20px;
    flex-wrap:wrap;
}

/* ===== KNAPPAR ===== */
.button{
    padding:30px 50px;
    font-size:20px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:0.3s;
    min-width:240px;
    color:#fff;
    font-weight:bold;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* ===== DX-OS ===== */
.os{
    background:#28a745;
}

/* ===== AI ===== */
.ai{
    background:#9c27b0;
}

/* ===== HOVER ===== */
.button:hover{
    transform:scale(1.05);
    opacity:0.9;
}

/* ===== AUDIO PANEL ===== */

.audio-controls{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

    padding:20px;

    max-width:600px;

    margin:0 auto;

}

.audio-controls button{

    padding:14px;

    border:none;

    border-radius:10px;

    background:#eab308;

    color:black;

    font-weight:bold;

    cursor:pointer;

}

#statusText{

    text-align:center;

    color:#eab308;

    margin-bottom:30px;

    font-size:18px;

}

/* ===== MOBIL ===== */
@media (max-width:600px){

    .container{
        gap:20px;
        padding:40px 15px;
    }

    .button{
        width:100%;
        max-width:320px;
        padding:20px;
        font-size:18px;
    }

    .timebar{
        gap:10px;
        font-size:16px;
        flex-direction:column;
        align-items:center;
    }

    header{
        font-size:22px;
    }

    #welcome{
        font-size:18px;
    }

    .audio-controls{

        grid-template-columns:1fr;

    }

}

</style>
</head>

<body>

<div class="wrapper">

<header>
DX SYSTEM DASHBOARD
</header>

<div id="welcome"></div>

<div class="timebar">
    <div id="date"></div>
    <div id="localTime"></div>
    <div id="utcTime"></div>
</div>

<div class="container">

    <!-- DX-OS -->
    <button class="button os"
        onclick="location.href='operations-center.html'">
        📡 DX-OS
    </button>

    <!-- AI -->
    <button class="button ai"
        onclick="openAI()">
        🤖 DX AI Assistent
    </button>

</div>

<!-- AUDIO PANEL START -->

<div class="audio-controls">

<button id="startRecording">
▶ Starta inspelning
</button>

<button id="stopRecording">
■ Stoppa inspelning
</button>

<button id="playRecording">
▶ Spela upp
</button>

<button id="downloadRecording">
⬇ Ladda ner
</button>

</div>

<div id="statusText">
Redo för inspelning
</div>

<!-- AUDIO PANEL END -->

</div>

<script>

/* ===== TID ===== */
const locale = navigator.language;

function updateTime(){

    const now = new Date();

    document.getElementById("date").innerText =
        now.toLocaleDateString(locale,{
            weekday:'long',
            year:'numeric',
            month:'long',
            day:'numeric'
        });

    document.getElementById("localTime").innerText =
        "Lokal: " + now.toLocaleTimeString(locale);

    document.getElementById("utcTime").innerText =
        "UTC: " + now.toUTCString().split(" ")[4];
}

/* ===== VÄLKOMST ===== */
function updateWelcome(){

    const now = new Date();
    const hour = now.getHours();
    const lang = navigator.language;

    let greeting = "";

    if(lang.startsWith("sv")){

        if(hour < 10){
            greeting = "God morgon";
        }

        else if(hour < 17){
            greeting = "God dag";
        }

        else{
            greeting = "God kväll";
        }

        greeting += " – redo att utforska världen via radio?";
    }

    else{

        if(hour < 10){
            greeting = "Good morning";
        }

        else if(hour < 17){
            greeting = "Good day";
        }

        else{
            greeting = "Good evening";
        }

        greeting += " – ready to explore the world?";
    }

    document.getElementById("welcome").innerText = greeting;
}

/* ===== AI KNAPP ===== */
function openAI(){

    window.open("https://chat.openai.com","_blank");
}

/* ===== START ===== */
updateTime();
updateWelcome();
setInterval(updateTime,1000);

</script>

<script src="js/audio-engine.js"></script>
<script src="js/live-radio.js"></script>

</body>
</html>
