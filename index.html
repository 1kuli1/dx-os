<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">

<!-- ===== MOBIL ===== -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ===== TITEL ===== -->
<title>DX SYSTEM</title>

<style>

/* ===== GRUND ===== */
*{
    box-sizing:border-box;
}

/* ===== BODY ===== */
body{
    font-family:Arial, sans-serif;
    background:#0b0f14;
    color:#ffffff;
    margin:0;
    display:flex;
    justify-content:center;
}

/* ===== WRAPPER ===== */
.wrapper{
    width:100%;
    max-width:900px;
}

/* ===== HEADER ===== */
header{
    background:#111821;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#eab308;
    border-bottom:2px solid #1f2937;
}

/* ===== VÄLKOMST ===== */
#welcome{
    text-align:center;
    font-size:22px;
    margin-top:15px;
    color:#9ecfff;
    padding:0 15px;
}

/* ===== TIDRAD ===== */
.timebar{
    display:flex;
    justify-content:center;
    gap:40px;
    background:#16202a;
    padding:15px;
    font-size:18px;
    flex-wrap:wrap;
    border-bottom:1px solid #223040;
}

/* ===== KNAPPOMRÅDE ===== */
.container{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:60px 20px;
    flex-wrap:wrap;
}

/* ===== KNAPPAR ===== */
.button{
    padding:30px 50px;
    font-size:20px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:0.3s;
    min-width:240px;
    color:#ffffff;
    font-weight:bold;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* ===== DX-OS ===== */
.os{
    background:#28a745;
}

/* ===== LOGGCENTER ===== */
.logg{
    background:#eab308;
    color:#000000;
}

/* ===== AI ===== */
.ai{
    background:#9c27b0;
}

/* ===== HOVER ===== */
.button:hover{
    transform:scale(1.05);
    opacity:0.92;
}

/* ===== MOBIL ===== */
@media(max-width:600px){

    .container{
        gap:20px;
        padding:40px 15px;
    }

    .button{
        width:100%;
        max-width:320px;
        padding:20px;
        font-size:18px;
    }

    .timebar{
        gap:10px;
        font-size:16px;
        flex-direction:column;
        align-items:center;
    }

    header{
        font-size:22px;
    }

    #welcome{
        font-size:18px;
    }

}

</style>

</head>

<body>

<div class="wrapper">

<!-- ===== HEADER ===== -->
<header>

    DX SYSTEM DASHBOARD

</header>

<!-- ===== VÄLKOMST ===== -->
<div id="welcome"></div>

<!-- ===== TID ===== -->
<div class="timebar">

    <div id="date"></div>

    <div id="localTime"></div>

    <div id="utcTime"></div>

</div>

<!-- ===== KNAPPAR ===== -->
<div class="container">

    <!-- ===== DX-OS ===== -->
    <button class="button os"
        onclick="location.href='operations-center.html'">

        📡 DX-OS

    </button>

    <!-- ===== LOGGCENTER ===== -->
    <button class="button logg"
        onclick="location.href='modules/logcenter.html'">

        📓 Loggcenter

    </button>

    <!-- ===== AI ===== -->
    <button class="button ai"
        onclick="openAI()">

        🤖 DX AI Assistent

    </button>

</div>

</div>

<script>

/* ===== SPRÅK ===== */
const locale = navigator.language;

/* ===== UPPDATERA TID ===== */
function updateTime(){

    /* Hämtar aktuell tid */
    const now = new Date();

    /* Visar datum */
    document.getElementById("date").innerText =
        now.toLocaleDateString(locale,{
            weekday:'long',
            year:'numeric',
            month:'long',
            day:'numeric'
        });

    /* Visar lokal tid */
    document.getElementById("localTime").innerText =
        "Lokal: " + now.toLocaleTimeString(locale);

    /* Visar UTC */
    document.getElementById("utcTime").innerText =
        "UTC: " + now.toUTCString().split(" ")[4];

}

/* ===== VÄLKOMSTTEXT ===== */
function updateWelcome(){

    /* Hämtar tid */
    const now = new Date();

    /* Hämtar timme */
    const hour = now.getHours();

    /* Hämtar språk */
    const lang = navigator.language;

    /* Tom text */
    let greeting = "";

    /* Svenska */
    if(lang.startsWith("sv")){

        if(hour < 10){
            greeting = "God morgon";
        }

        else if(hour < 17){
            greeting = "God dag";
        }

        else{
            greeting = "God kväll";
        }

        greeting += " – redo att utforska världen via radio?";

    }

    /* Engelska */
    else{

        if(hour < 10){
            greeting = "Good morning";
        }

        else if(hour < 17){
            greeting = "Good day";
        }

        else{
            greeting = "Good evening";
        }

        greeting += " – ready to explore the world?";

    }

    /* Skriver ut text */
    document.getElementById("welcome").innerText = greeting;

}

/* ===== ÖPPNA AI ===== */
function openAI(){

    /* Öppnar ChatGPT */
    window.open(
        "https://chat.openai.com",
        "_blank"
    );

}

/* ===== START ===== */

/* Startar tid */
updateTime();

/* Startar välkomsttext */
updateWelcome();

/* Uppdaterar tid varje sekund */
setInterval(updateTime,1000);

</script>

</body>
</html>
